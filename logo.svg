<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 88" width="300" height="88" role="img" aria-label="Sunser — Infissi e Serramenti">
  <title>Sunser</title>
  <defs>
    <filter id="wsh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2" flood-color="rgba(0,0,0,.22)"/>
    </filter>
  </defs>

  <!-- ══ OUTER WINDOW FRAME ══ -->
  <rect x="4" y="2" width="90" height="84" rx="3" fill="#f8f8f8" stroke="#ccc" stroke-width="1" filter="url(#wsh)"/>

  <!-- ══ SKY BACKGROUND ══ -->
  <rect x="10" y="7" width="78" height="72" rx="1" fill="#9fd3ec"/>

  <!-- ══ SUN ══ -->
  <circle cx="30" cy="28" r="10.5" fill="#f5c200"/>
  <line x1="30" y1="12" x2="30" y2="8"  stroke="#f5c200" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="30" y1="44" x2="30" y2="48" stroke="#f5c200" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="14" y1="28" x2="10" y2="28" stroke="#f5c200" stroke-width="3.2" stroke-linecap="round"/>
  <line x1="46" y1="28" x2="50" y2="28" stroke="#f5c200" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="22.6" y1="20.6" x2="19.4" y2="17.4" stroke="#f5c200" stroke-width="2.4" stroke-linecap="round"/>
  <line x1="37.4" y1="35.4" x2="40.6" y2="38.6" stroke="#f5c200" stroke-width="2"   stroke-linecap="round"/>
  <line x1="37.4" y1="20.6" x2="40.6" y2="17.4" stroke="#f5c200" stroke-width="2"   stroke-linecap="round"/>
  <line x1="22.6" y1="35.4" x2="19.4" y2="38.6" stroke="#f5c200" stroke-width="2"   stroke-linecap="round"/>
  <line x1="26.5" y1="15.5" x2="24" y2="11.5" stroke="#f5c200" stroke-width="2" stroke-linecap="round"/>

  <!-- ══ BUILDING SILHOUETTE — 3 rising bars, tallest has peaked roof ══ -->
  <rect x="54" y="53" width="8" height="26" rx="1" fill="#8b1a1a"/>
  <rect x="54" y="53" width="2" height="26" fill="rgba(255,255,255,.15)"/>
  <rect x="64" y="41" width="8" height="38" rx="1" fill="#8b1a1a"/>
  <rect x="64" y="41" width="2" height="38" fill="rgba(255,255,255,.15)"/>
  <rect x="74" y="31" width="8" height="48" rx="0" fill="#8b1a1a"/>
  <polygon points="78,22 74,31 82,31" fill="#8b1a1a"/>
  <rect x="74" y="31" width="2" height="48" fill="rgba(255,255,255,.15)"/>

  <!-- ground line -->
  <rect x="10" y="78" width="78" height="2" rx="1" fill="rgba(0,0,0,.1)"/>

  <!-- ══ SUNSER TEXT inside window ══ -->
  <text x="48" y="75"
    font-family="Inter,Arial Black,sans-serif"
    font-size="9" font-weight="900" letter-spacing="2.5"
    fill="#1a1a1a" text-anchor="middle">SUNSER</text>

  <!-- ══ CENTRE DIVIDER ══ -->
  <rect x="46" y="7" width="5" height="72" rx="1" fill="#ddd" stroke="#c8c8c8" stroke-width=".5"/>

  <!-- ══ LEFT CASEMENT (open outward) ══ -->
  <g transform="skewY(-5) translate(-7,5)">
    <rect x="4" y="2" width="13" height="84" rx="2" fill="#efefef" stroke="#c5c5c5" stroke-width=".8"/>
    <rect x="6" y="5" width="9"  height="78" rx="1" fill="rgba(159,211,236,.22)"/>
    <line x1="9" y1="5" x2="9" y2="83" stroke="rgba(255,255,255,.65)" stroke-width="1.1"/>
  </g>

  <!-- ══ RIGHT CASEMENT (open outward) ══ -->
  <g transform="skewY(5) translate(81,-5)">
    <rect x="0" y="2" width="13" height="84" rx="2" fill="#efefef" stroke="#c5c5c5" stroke-width=".8"/>
    <rect x="2" y="5" width="9"  height="78" rx="1" fill="rgba(159,211,236,.22)"/>
    <line x1="11" y1="5" x2="11" y2="83" stroke="rgba(255,255,255,.65)" stroke-width="1.1"/>
    <rect x="0" y="37" width="4" height="12" rx="2" fill="#b4b4b4"/>
  </g>

  <!-- ══════════ WORDMARK ══════════ -->
  <text x="108" y="49"
    font-family="Inter,Arial Black,sans-serif"
    font-size="34" font-weight="900" letter-spacing="-1"
    fill="#ffffff">SUNSER</text>

  <text x="110" y="65"
    font-family="Inter,Arial,sans-serif"
    font-size="7.8" font-weight="700" letter-spacing="3.5"
    fill="#7ab51d">INFISSI &amp; SERRAMENTI</text>
</svg>
